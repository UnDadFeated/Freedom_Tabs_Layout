<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freedom Tabs Layout</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Freedom Tabs</h1>
      <button id="refresh-btn" title="Refresh List">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
      </button>
      <p class="subtitle">Save your digital workspace</p>
    </header>

    <div class="main-actions">
      <input type="text" id="layout-name" placeholder="Name this layout..." aria-label="Layout Name">
      <button id="save-btn" class="primary-btn">Save Current Layout</button>
    </div>

    <hr>

    <div class="saved-layouts-section">
      <h3>Saved Layouts</h3>
      <div id="status-bar" class="status-bar"></div>
      <div id="layouts-list" class="layouts-list">
        <!-- Layouts will be injected here -->
        <div class="empty-state">No layouts saved yet.</div>
      </div>
    </div>
    <div class="footer">
      <span id="version-text">v0.0.0</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
